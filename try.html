<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loan calculater</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #loading,#results{
            display: none;
        }
    </style>
</head>
<body class="bg-dark">
<div class="container">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card card-body text-center mt-5">
                <h1 class="headding display-5 pb-3">Loan Calculator</h1>
                <form id="loan-form">
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text">$</div>
                                </div>
                                <input type="number" placeholder="loan-ammout" id="loan-ammount" class="form-control"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text">%</div>
                                </div>
                                <input type="number" placeholder="interest value" id="interest" class="form-control"/>
                        </div>
                    </div>
                    <div class="form-group">
                     <input type="number" placeholder="years to pay" id="years" class="form-control"/>
                     </div>
                     <div class="form-group">
                        <input type="submit" class="btn btn-dark w-100" value="calculate"/>
                        <button type="button" id="clear-btn" class="btn btn-secondary w-100">Clear</button> 
                     </div>
                </form>
                <div id="loading">
                    <img src="img/kOnzy.gif" alt="" width="80"/>
                </div>

                <div id="results" class="pt-4">
                    <h5>results</h5>
                     <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text">mountly-payment</div>
                                </div>
                                <input type="number" id="mountly-payment" class="form-control" disabled/>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text">total-ammount</div>
                                </div>
                                <input type="number" id="total-ammount" class="form-control" disabled/>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text">total-intrest</div>
                                </div>
                                <input type="number" id="total-intrest" class="form-control" disabled/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
   <script src="script.js"></script> 
</body>
</html>
